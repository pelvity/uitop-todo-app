version: '3.8'
services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "3031:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend-data:/app/data
    environment:
      - NODE_ENV=development
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - API_URL=http://backend:3001
    depends_on:
      - backend
    command: npm run dev

volumes:
  backend-data:
  caddy-data:
  caddy-config:
