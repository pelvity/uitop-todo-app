services:
  - type: web
    name: uitop-api
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/todos
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_PATH
        value: /var/data/todo.db
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
